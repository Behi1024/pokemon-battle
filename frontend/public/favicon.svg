<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c"><circle cx="50" cy="50" r="46"/></clipPath>
  </defs>
  <!-- White base -->
  <circle cx="50" cy="50" r="46" fill="white"/>
  <!-- Red top half -->
  <rect x="0" y="0" width="100" height="50" fill="#E3350D" clip-path="url(#c)"/>
  <!-- Black center band -->
  <rect x="0" y="43" width="100" height="14" fill="#1a1a2e" clip-path="url(#c)"/>
  <!-- Outer border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#1a1a2e" stroke-width="7"/>
  <!-- White center ring -->
  <circle cx="50" cy="50" r="14" fill="white" stroke="#1a1a2e" stroke-width="4"/>
  <!-- Button center -->
  <circle cx="50" cy="50" r="6.5" fill="#1a1a2e"/>
  <!-- Button shine -->
  <circle cx="47" cy="47" r="2.5" fill="white" opacity="0.45"/>
</svg>
